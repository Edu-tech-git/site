<!DOCTYPE html>

    <!-- Cairo font (for body) loaded from Google Fonts. Place Arnold font files in `assests/` for the H1 if available. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap"

    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="logo-wrap">
          <!-- Put your header logos in the `assests/` folder (example names shown). -->
          <img
            src="assests/logo-left.png"
            alt="University logo left"
            onerror="this.style.display='none'"
          />
        </div>

        <div>
          <h1>Short Quiz: Grammar</h1>
          <div class="meta">
            صفحة تفاعلية للاختبار — أجب على الأسئلة واحصل على ملاحظات فورية
          </div>
        </div>

        <div class="logo-wrap" style="justify-self: end">
          <img
            src="assests/logo-right.png"
            alt="University logo right"
            onerror="this.style.display='none'"
          />
        </div>
      </header>
      <div class="meta">الأسئلة: <span id="totalCount">0</span></div>

      <main class="card">
        <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>

        <div class="q-area">
          <section>
            <div id="questionBox">
              <!-- question injected here -->
            </div>

            <div class="controls">
              <button
                id="submitBtn"
                disabled
                style="
                  display: inline-block;
                  background: #0b5fff;
                  color: #fff;
                  padding: 8px 14px;
                  border-radius: 6px;
                  border: none;
                  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
                  position: relative;
                  z-index: 1;
                "
              >
                تأكيد الإجابة
              </button>
              <button id="nextBtn" class="secondary" style="display: none">
                التالي
              </button>
              <button id="hintBtn" class="ghost">إظهار التلميح</button>
              <button
                id="showAllBtn"
                class="secondary"
                style="margin-left: auto; visibility: hidden"
              >
                عرض المراجعة
              </button>
            </div>

            <div id="hintBox" class="hint" style="display: none"></div>
            <div
              id="rationaleBox"
              class="rationale"
              style="display: none"
            ></div>
          </section>

          <aside>
            <div style="font-weight: 600; margin-bottom: 8px">النتيجة</div>
            <div
              class="card"
              style="padding: 12px; background: #f9fafb; box-shadow: none"
            >
              <div>
                السؤال الحالي: <strong id="currentIndex">0</strong> /
                <strong id="totalIndex">0</strong>
              </div>
              <div style="margin-top: 8px" class="score">
                النقاط: <span id="score">0</span>
              </div>
              <div class="review">
                <button id="restartBtn" class="ghost">أعد الاختبار</button>
              </div>
            </div>
          </aside>
        </div>

        <div id="finalResults" class="results card" style="margin-top: 14px">
          <div class="score">
            النتيجة النهائية: <span id="finalScore">0</span> /
            <span id="finalTotal">0</span>
          </div>
          <div
            id="finalMessage"
            style="margin-top: 8px; color: var(--muted)"
          ></div>
          <div style="margin-top: 10px">
            <button id="reviewBtn" class="secondary">مراجعة الإجابات</button>
            <button id="retryBtn" style="margin-left: 8px">
              حاول مرة أخرى
            </button>
            <button
              id="mindMapBtn"
              class="secondary"
              style="margin-left: 8px; display: none"
            >
              عرض الخرائط الذهنية
            </button>
          </div>
        </div>

        <footer>
          <p>hope you get the point💕</p>
          <!-- keep an accessible direct link but hide it for now; the modal/button will appear in the final results -->
          <button class="" style="display: none">
            <a
              href="assests/Mind Map.png"
              target="_blank"
              style="text-decoration: none"
              >Mind Map</a
            >
          </button>
        </footer>
      </main>
    </div>

        aria-modal="true"

        <div style="text-align: center">
          <button id="closeMindMap" class="mm-close">إغلاق</button>
        </div>
      </div>
    </div>

          {
            question:
              "The research assistant ______ samples when the alarm went off.",
            answerOptions: [
              {
                text: "was collecting",
                rationale:
                  "Past continuous interrupted by another past event — correct.",
                isCorrect: true,
              },
              {
                text: "collected",
                rationale:
                  "Past simple — completed action, less likely for interruption.",
                isCorrect: false,
              },
              {
                text: "has collected",
                rationale: "Present perfect — not matching past interruption.",
                isCorrect: false,
              },
              {
                text: "collects",
                rationale: "Present simple — incorrect.",
                isCorrect: false,
              },
            ],
            hint: "Interrupted action in the past → past continuous.",
          },
        ],
      };

      const quiz = data.quiz;
      let current = 0;
      let score = 0;
      const total = quiz.length;
      // keep track of user's selections for review (null = unanswered)
      const userAnswers = Array.from({ length: total }).map(() => null);

      // UI refs
      const questionBox = document.getElementById("questionBox");
      const submitBtn = document.getElementById("submitBtn");
      const hintBtn = document.getElementById("hintBtn");
      const nextBtn = document.getElementById("nextBtn");
      const hintBox = document.getElementById("hintBox");
      const rationaleBox = document.getElementById("rationaleBox");
      const progressBar = document.getElementById("progressBar");
      const scoreEl = document.getElementById("score");
      const currentIndex = document.getElementById("currentIndex");
      const totalIndex = document.getElementById("totalIndex");
      const totalCount = document.getElementById("totalCount");
      const finalResults = document.getElementById("finalResults");
      const finalScore = document.getElementById("finalScore");
      const finalTotal = document.getElementById("finalTotal");
      const finalMessage = document.getElementById("finalMessage");
      const showAllBtn = document.getElementById("showAllBtn");
      const restartBtn = document.getElementById("restartBtn");
      const mindMapBtn = document.getElementById("mindMapBtn");
      const mindMapModal = document.getElementById("mindMapModal");
      const mindMapImage = document.getElementById("mindMapImage");
      const closeMindMap = document.getElementById("closeMindMap");

      totalCount.textContent = total;
      totalIndex.textContent = total;

      function renderQuestion(index) {
        const q = quiz[index];
        currentIndex.textContent = index + 1;
        progressBar.style.width = Math.round((index / total) * 100) + "%";
        hintBox.style.display = "none";
        rationaleBox.style.display = "none";
        submitBtn.disabled = true;
        nextBtn.style.display = "none";
        const choicesHtml = q.answerOptions
          .map((opt, i) => {
            return `\n          <label class="choice" data-i="${i}" tabindex="0">\n            <input type="radio" name="choice" value="${i}">\n            <span>${opt.text}</span>\n          </label>`;
          })
          .join("\n");

        questionBox.innerHTML = `
        <div class="question">${q.question}</div>
        <div class="choices" role="radiogroup" aria-labelledby="currentIndex">${choicesHtml}</div>
      `;

        // attach listeners to choices
        document
          .querySelectorAll('.choices input[name="choice"]')
          .forEach((inp) => {
            inp.addEventListener("change", () => {
              submitBtn.disabled = false;
            });
          });

        // keyboard select for labels + basic arrow navigation
        const labels = Array.from(document.querySelectorAll("label.choice"));
        labels.forEach((lbl, idx) => {
          const input = lbl.querySelector("input");
          lbl.setAttribute("role", "radio");
          lbl.tabIndex = 0;
          lbl.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "Enter") {
              e.preventDefault();
              input.checked = true;
              submitBtn.disabled = false;
            } else if (e.key === "ArrowDown" || e.key === "ArrowRight") {
              e.preventDefault();
              const next = labels[idx + 1] || labels[0];
              next.focus();
            } else if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
              e.preventDefault();
              const prev = labels[idx - 1] || labels[labels.length - 1];
              prev.focus();
            }
          });
        });

        // restore previously selected answer (if any)
        const prevSel = userAnswers[index];
        if (prevSel !== null) {
          const node = document.querySelector(
            `.choices input[value="${prevSel}"]`
          );
          if (node) {
            node.checked = true;
            submitBtn.disabled = false;
          }
        }

        // focus first choice for keyboard users
        const firstInp = document.querySelector(".choices input");
        if (firstInp) firstInp.focus();
      }

      function handleSubmit() {
        const sel = document.querySelector(
          '.choices input[name="choice"]:checked'
        );
        if (!sel) return;
        const selIdx = Number(sel.value);
        // save user's answer
        userAnswers[current] = selIdx;
        const q = quiz[current];
        const correctIdx = q.answerOptions.findIndex((o) => o.isCorrect);
        // mark choices
        document.querySelectorAll("label.choice").forEach((lbl) => {
          const i = Number(lbl.getAttribute("data-i"));
          lbl.classList.remove("correct", "wrong");
          if (i === correctIdx) lbl.classList.add("correct");
          if (i === selIdx && i !== correctIdx) lbl.classList.add("wrong");
        });

        // show rationale
        rationaleBox.style.display = "block";
        rationaleBox.innerHTML = `<strong>reason:</strong> ${q.answerOptions[selIdx].rationale}`;

        if (q.answerOptions[selIdx].isCorrect) {
          score++;
          scoreEl.textContent = score;
          // Trigger confetti for correct answer
          try {
            confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
          } catch (e) {}
        }

        // make the 'عرض المراجعة' control available after the first submission
        try {
          if (showAllBtn) showAllBtn.style.visibility = "visible";
        } catch (e) {}

        // prevent changing answer after submission
        document
          .querySelectorAll('.choices input[name="choice"]')
          .forEach((i) => (i.disabled = true));

        submitBtn.style.display = "none";
        nextBtn.style.display = "inline-block";
        updateProgressOnSubmit();
      }

      function updateProgressOnSubmit() {
        progressBar.style.width =
          Math.round(((current + 1) / total) * 100) + "%";
      }

      function showHint() {
        const q = quiz[current];
        hintBox.style.display =
          hintBox.style.display === "none" ? "block" : "none";
        hintBox.textContent = q.hint || "لا تلميح متاح.";
      }

      function nextQuestion() {
        current++;
        if (current < total) {
          renderQuestion(current);
          submitBtn.style.display = "inline-block";
        } else {
          finishQuiz();
        }
      }

      function finishQuiz() {
        finalResults.style.display = "flex";
        finalScore.textContent = score;
        finalTotal.textContent = total;
        const pct = Math.round((score / total) * 100);
        finalMessage.textContent = `لقد حصلت على ${pct}% — ${score} من ${total}.`;
        // show mind-map button in final area
        try {
          if (mindMapBtn) mindMapBtn.style.display = "inline-block";
        } catch (e) {}
        // hide main controls
        document.getElementById("questionBox").innerHTML = "";
        submitBtn.style.display = "none";
        nextBtn.style.display = "none";
        hintBtn.style.display = "none";
      }

      // animate numeric count (used for the final score)
      function animateCount(el, from, to, duration) {
        const start = performance.now();
        const frame = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const val = Math.floor(from + (to - from) * t);
          el.textContent = val;
          if (t < 1) requestAnimationFrame(frame);
        };
        requestAnimationFrame(frame);
      }

      function reviewAnswers() {
        // render all questions + correct answers + chosen answer + rationale
        const dump = quiz
          .map((q, idx) => {
            const correctIdx = q.answerOptions.findIndex((o) => o.isCorrect);
            const choices = q.answerOptions
              .map((o, i) => {
                const userSel = userAnswers[idx];
                const isUser = userSel === i;
                const isCorrect = i === correctIdx;
                const styleParts = [];
                if (isCorrect)
                  styleParts.push(
                    "background:rgba(47,133,90,0.06);border-left:4px solid rgba(47,133,90,0.18);"
                  );
                if (isUser && !isCorrect)
                  styleParts.push(
                    "background:rgba(229,62,62,0.06);border-left:4px solid rgba(229,62,62,0.18);"
                  );
                return `<div aria-live="polite" style="padding:6px;border-radius:6px;margin:6px 0;${styleParts.join(
                  ""
                )}">${i + 1}. ${o.text}${
                  isUser
                    ? ' <strong style="margin-left:8px">(اختيارك)</strong>'
                    : ""
                }</div>`;
              })
              .join("");
            return `<div style="margin-bottom:14px"><div style="font-weight:700">${
              idx + 1
            }. ${
              q.question
            }</div>${choices}<div style="color:var(--muted);margin-top:6px"><strong>reason:</strong> ${
              q.answerOptions[correctIdx].rationale
            }</div></div>`;
          })
          .join("");

        document.getElementById("questionBox").innerHTML = dump;
        submitBtn.style.display = "none";
        nextBtn.style.display = "none";
        hintBtn.style.display = "none";
      }

      // events
      submitBtn.addEventListener("click", handleSubmit);
      hintBtn.addEventListener("click", showHint);
      nextBtn.addEventListener("click", () => {
        nextQuestion();
      });
      showAllBtn.addEventListener("click", reviewAnswers);
      restartBtn.addEventListener("click", () => {
        location.reload();
      });

      // Mind map button & modal handlers
      if (mindMapBtn) {
        mindMapBtn.addEventListener("click", () => {
          if (mindMapModal) {
            mindMapModal.classList.add("open");
            mindMapModal.setAttribute("aria-hidden", "false");
          }
        });
      }
      if (closeMindMap) {
        closeMindMap.addEventListener("click", () => {
          if (mindMapModal) {
            mindMapModal.classList.remove("open");
            mindMapModal.setAttribute("aria-hidden", "true");
          }
        });
      }
      // close modal on overlay click
      if (mindMapModal) {
        mindMapModal.addEventListener("click", (e) => {
          if (e.target === mindMapModal) {
            mindMapModal.classList.remove("open");
            mindMapModal.setAttribute("aria-hidden", "true");
          }
        });
      }
      // ESC to close
      window.addEventListener("keydown", (e) => {
        if (
          e.key === "Escape" &&
          mindMapModal &&
          mindMapModal.classList.contains("open")
        ) {
          mindMapModal.classList.remove("open");
          mindMapModal.setAttribute("aria-hidden", "true");
        }
      });

      document.getElementById("retryBtn").addEventListener("click", () => {
        location.reload();
      });
      document.getElementById("reviewBtn").addEventListener("click", () => {
        reviewAnswers();
        finalResults.style.display = "none";
      });

      // initial render
      renderQuestion(0);
      scoreEl.textContent = score;

      // small accessibility: focus first interactive element on load
      window.addEventListener("load", () => {
        const firstChoice = document.querySelector(".choices input");
        if (firstChoice) firstChoice.focus();
      });
    </script>
  </body>
</html>
